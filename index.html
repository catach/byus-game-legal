<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byu's Game</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.15s ease;
    }
    .card:hover { border-color: #999; transform: translateY(-1px); }
    .card h2 { margin: 0 0 4px 0; font-size: 1.1rem; }
    .card p { margin: 0; color: #666; font-size: 0.95rem; }
    footer { margin-top: 40px; color: #999; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Byu's Game</h1>
  <p class="subtitle">Official information pages</p>

  <a class="card" href="privacy.html">
    <h2>Privacy Policy</h2>
    <p>How we handle your data (spoiler: we don't collect any).</p>
  </a>

  <a class="card" href="support.html">
    <h2>Support</h2>
    <p>Need help? Get in touch.</p>
  </a>

  <footer>© Byu's Game</footer>
</body>
</html>
